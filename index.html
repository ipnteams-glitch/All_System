<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EA SYSTEMS MONITOR</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #121212; 
            margin: 0;
            padding: 10px; 
            overflow-x: hidden;
            width: 100%;
        }

        .container-fluid { padding: 0; margin: 0; width: 100%; }

        .mobile-header { padding: 20px 0 25px 0; }
        
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        /* จัดกลุ่มโลโก้และชื่อ EA ให้อยู่ด้วยกัน */
        .header-title-group {
            display: flex;
            align-items: center;
        }

        /* ปรับขนาดโลโก้ให้พอดีกับความสูงของบรรทัด */
        .header-logo {
            height: 45px; 
            width: auto;  
            margin-right: 12px; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(255, 255, 255, 0.1);
        }

        .mobile-header h4 { 
            color: #ffffff; 
            margin: 0; 
            font-size: 1.5rem; 
            font-weight: 600;
            letter-spacing: 1px; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); 
        }

        .new-version-link {
            color: #ffeb3b !important; 
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap; 
        }

        .new-version-link:hover { text-decoration: underline; color: #fff176 !important; }

        .ea-card { 
            border: none; 
            border-radius: 25px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
            overflow: hidden; 
            width: 100%;
            height: 100%; 
            color: #ffffff !important; 
        }

        .status-online { 
            color: #4cd137; 
            font-size: 0.9rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 500;
            margin-top: 15px; 
        }

        .dot { 
            height: 10px; width: 10px; 
            background-color: #4cd137; 
            border-radius: 50%; 
            display: inline-block; 
            margin-right: 8px; 
            animation: pulse 1.8s infinite; 
        }

        @keyframes pulse { 
            0% { opacity: 1; transform: scale(1); } 
            50% { opacity: 0.4; transform: scale(1.2); } 
            100% { opacity: 1; transform: scale(1); } 
        }

        .balance-box { 
            background-color: rgba(255,255,255,0.15); 
            border-radius: 20px; 
            padding: 18px; 
            margin-top: 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .ea-card h5.fw-bold { 
            color: #ffeb3b !important; 
            font-size: 1.35rem; 
            letter-spacing: 0.5px; 
            margin-bottom: 12px !important; 
        }
        .ea-card .text-muted { color: rgba(255,255,255,0.7) !important; font-weight: 300; font-size: 0.85rem; }
        .ea-card .text-secondary { color: #ffffff !important; font-weight: 500; font-size: 1rem; line-height: 1.4; }
        
        .badge.bg-primary { 
            background-color: rgba(255,255,255,0.2) !important; 
            color: #ffffff;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
            font-weight: 400; 
            font-size: 0.75rem; 
            padding: 6px 12px;
        }

        .style-badge {
            display: inline-block;
            color: #ffffff !important;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            white-space: normal; 
            max-width: 100%;
        }

        /* Style สำหรับปุ่ม LINE */
        .line-btn {
            background-color: #06C755; 
            color: #ffffff !important;
            border: none;
            border-radius: 50px; 
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: 500;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 6px 15px rgba(6, 199, 85, 0.3);
            transition: transform 0.2s ease, background-color 0.2s ease;
            margin-top: 30px; 
            margin-bottom: 20px; 
        }

        .line-btn:hover {
            background-color: #05b34c;
            transform: translateY(-2px);
            color: #ffffff;
        }

        .line-icon {
            width: 28px;
            height: 28px;
            margin-right: 10px;
            fill: #ffffff;
        }

        #loader { min-height: 200px; display: flex; align-items: center; justify-content: center; }
        .spinner-border { color: #ffffff !important; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="mobile-header">
        <div class="header-flex">
            <div class="header-title-group">
                <img src="https://img1.pic.in.th/images/ealogo.png" alt="EA Atlantis Logo" class="header-logo">
                <h4 class="fw-bold">[EA] ATLANTIS</h4>
            </div>
            
            <a href="https://drive.google.com/drive/folders/1V2LxJWNmFhOrvp0JRt5CyUy9UDaBB2Tb" target="_blank" class="new-version-link">New Version + Preset</a>
        </div>
        <div class="status-online">
            <span class="dot"></span>Live Update
        </div>
    </div>

    <div id="loader">
        <div class="spinner-border" role="status"></div>
    </div>

    <div id="ea-container" class="row row-cols-1 g-3 px-2"></div>

    <div id="contact-section" class="px-2" style="display: none;">
        <a href="https://lin.ee/9B1pFmD" target="_blank" class="line-btn">
            <svg class="line-icon" viewBox="0 0 24 24">
                <path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.122.303.079.778.039 1.085l-.171 1.027c-.053.303-.242 1.186 1.039.647 1.281-.54 6.911-4.069 9.428-6.967 1.739-1.907 2.572-3.843 2.572-5.992zm-15.278 1.954h-3.327v-5.465h1.222v4.306h2.105v1.159zm2.41 0h-1.221v-5.465h1.221v5.465zm5.556-3.805l-2.348 3.805h-1.399v-5.465h1.221v3.251l2.251-3.251h1.496v5.465h-1.221v-3.805zm3.627-1.66h-2.104v1.159h2.104v1.159h-2.104v1.158h2.104v1.159h-3.326v-5.465h3.326v1.16z"/>
            </svg>
            Line Contact : @479ufnya
        </a>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwUVLhRbdk2noN4GeHC-j_zaz2mxD8bjUDWIjg2aljSodPvJJzbq-2GHwitiIpHo5a5dQ/exec";

    const color1 = '#130f40'; 
    const color2 = '#2f3640'; 

    document.addEventListener('DOMContentLoaded', fetchData);

    function fetchData() {
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                renderCards(data);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('ea-container').innerHTML = 
                    '<div class="alert alert-danger mx-3 text-center w-100">เกิดข้อผิดพลาดในการดึงข้อมูล</div>';
            });
    }

    function renderCards(data) {
        const container = document.getElementById('ea-container');
        const loader = document.getElementById('loader');
        const contactSection = document.getElementById('contact-section'); 
        
        if (loader) loader.style.display = 'none';

        if (!data || data.length === 0) {
            container.innerHTML = '<div class="alert alert-warning mx-3 text-center w-100">ไม่พบข้อมูลในระบบ</div>';
            contactSection.style.display = 'block'; 
            return;
        }

        let html = '';

        data.forEach((item, index) => {
            const bgColor = (index % 2 === 0) ? color1 : color2;
            
            let typeText = item.type || '-';
            let styleBgColor = '#555555'; 
            
            if (typeText.includes('เสี่ยงสูง')) {
                styleBgColor = 'maroon'; 
            } else if (typeText.includes('เสี่ยงต่ำ')) {
                styleBgColor = 'darkgreen'; 
            }

            html += `
                <div class="col">
                    <div class="ea-card" style="background-color: ${bgColor}">
                        <div class="p-4"> 
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="badge rounded-pill bg-primary">Running</span>
                            </div>
                            <h5 class="fw-bold">${item.name}</h5>
                            
                            <div class="row g-2 mt-2">
                                <div class="col-6">
                                    <small class="text-muted d-block mb-1">Model</small>
                                    <div class="text-secondary">${item.comment || '-'}</div>
                                </div>
                                <div class="col-6 text-end">
                                    <small class="text-muted d-block mb-1">Style</small>
                                    <div class="style-badge" style="background-color: ${styleBgColor};">${typeText}</div> 
                                </div>
                            </div>

                            <div class="balance-box text-center mt-3">
                                <small class="text-muted d-block mb-1">Start Balance</small>
                                <h2 class="fw-bold text-white mb-0">$${item.balance}</h2> 
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        contactSection.style.display = 'block';
    }
</script>

</body>
</html>
