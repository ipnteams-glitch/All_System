<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f6f9; padding: 15px; }
        .mobile-header { padding: 15px 0 25px 0; text-align: center; }
        .ea-card { border: none; border-radius: 20px; margin-bottom: 18px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); overflow: hidden; }
        .status-online { color: #28a745; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; }
        .dot { height: 8px; width: 8px; background-color: #28a745; border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 1.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
        .balance-box { background-color: rgba(255,255,255,0.5); border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.3); }
        .ea-card h5.fw-bold { color: #222 !important; }
        .ea-card .text-muted { color: #555 !important; }
        .ea-card .text-secondary { color: #333 !important; font-weight: 500; }
        .ea-card .balance-box .text-primary { color: #0056b3 !important; }
        .badge.bg-primary { background-color: #0d6efd !important; font-weight: 400; }
    </style>
</head>
<body>

<div class="container">
    <div class="mobile-header">
        <h4 class="fw-bold mb-1">EA SYSTEMS MONITOR</h4>
        <div class="status-online"><span class="dot"></span>Live Update</div>
    </div>
    <div id="loader" class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
    <div id="ea-container"></div>
</div>

<script>
    // ใส่ URL ของ Web App คุณตรงนี้
    const API_URL = "https://script.google.com/macros/s/AKfycbwUVLhRbdk2noN4GeHC-j_zaz2mxD8bjUDWIjg2aljSodPvJJzbq-2GHwitiIpHo5a5dQ/exec";

    const pastelColors = ['#E3F2FD', '#E8F5E9', '#FFFDE7', '#FFF3E0', '#F3E5F5', '#E0F2F1', '#FFEBEE', '#F1F8E9', '#EFEBE9'];
    let lastColorIndex = -1;

    function getUniqueRandomColor() {
        let newIndex;
        do { newIndex = Math.floor(Math.random() * pastelColors.length); } 
        while (newIndex === lastColorIndex);
        lastColorIndex = newIndex;
        return pastelColors[newIndex];
    }

    document.addEventListener('DOMContentLoaded', fetchData);

    function fetchData() {
        fetch(API_URL)
            .then(response => response.json())
            .then(data => renderCards(data))
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('ea-container').innerHTML = '<div class="alert alert-danger text-center">เกิดข้อผิดพลาดในการดึงข้อมูล</div>';
            });
    }

    function renderCards(data) {
        const container = document.getElementById('ea-container');
        const loader = document.getElementById('loader');
        if (loader) loader.style.display = 'none';
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="alert alert-warning text-center">ไม่พบข้อมูล</div>';
            return;
        }

        let html = '';
        lastColorIndex = -1;
        data.forEach((item) => {
            const bgColor = getUniqueRandomColor();
            html += `
                <div class="ea-card" style="background-color: ${bgColor}">
                    <div class="p-4">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="text-muted small">Name</span>
                            <span class="badge rounded-pill bg-primary">Running</span>
                        </div>
                        <h5 class="fw-bold mb-3">${item.name}</h5>
                        <div class="row g-2">
                            <div class="col-6">
                                <small class="text-muted d-block">Comment</small>
                                <span class="text-secondary small">${item.comment || '-'}</span>
                            </div>
                            <div class="col-6 text-end">
                                <small class="text-muted d-block">Type</small>
                                <span class="text-secondary small">${item.type || '-'}</span> 
                            </div>
                        </div>
                        <div class="balance-box text-center">
                            <small class="text-muted d-block mb-1">Current Balance</small>
                            <h3 class="fw-bold text-primary mb-0">$${item.balance}</h3>
                        </div>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }
</script>
</body>
</html>
