<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EA SYSTEMS MONITOR</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #f4f6f9; 
            margin: 0;
            padding: 10px; /* เว้นขอบจอนิดเดียวให้ดูแพง */
            overflow-x: hidden;
            width: 100%;
        }

        .container-fluid {
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .mobile-header { 
            padding: 20px 0 25px 0; 
            text-align: center; 
        }

        .ea-card { 
            border: none; 
            border-radius: 25px; 
            margin-bottom: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            overflow: hidden; 
            width: 100%;
            transition: transform 0.2s ease;
        }

        .status-online { 
            color: #28a745; 
            font-size: 0.9rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 500;
        }

        .dot { 
            height: 10px; 
            width: 10px; 
            background-color: #28a745; 
            border-radius: 50%; 
            display: inline-block; 
            margin-right: 8px; 
            animation: pulse 1.8s infinite; 
        }

        @keyframes pulse { 
            0% { opacity: 1; transform: scale(1); } 
            50% { opacity: 0.4; transform: scale(1.2); } 
            100% { opacity: 1; transform: scale(1); } 
        }

        .balance-box { 
            background-color: rgba(255,255,255,0.5); 
            border-radius: 20px; 
            padding: 18px; 
            margin-top: 15px; 
            border: 1px solid rgba(255,255,255,0.3); 
        }

        /* Typography */
        .ea-card h5.fw-bold { color: #1a1a1a !important; font-size: 1.25rem; }
        .ea-card .text-muted { color: #555 !important; font-weight: 300; }
        .ea-card .text-secondary { color: #222 !important; font-weight: 600; font-size: 0.95rem; }
        .ea-card .balance-box .text-primary { color: #0056b3 !important; }
        
        .badge.bg-primary { 
            background-color: #0d6efd !important; 
            font-weight: 400; 
            font-size: 0.75rem;
            padding: 6px 12px;
        }

        #loader { min-height: 200px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="mobile-header">
        <h4 class="fw-bold mb-1">EA SYSTEMS MONITOR</h4>
        <div class="status-online">
            <span class="dot"></span>Live Update
        </div>
    </div>

    <div id="loader">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div id="ea-container"></div>
</div>

<script>
    // 1. URL ของ Google Apps Script (Web App) ของคุณ
    const API_URL = "https://script.google.com/macros/s/AKfycbwUVLhRbdk2noN4GeHC-j_zaz2mxD8bjUDWIjg2aljSodPvJJzbq-2GHwitiIpHo5a5dQ/exec";

    // 2. Palette สี Pastel สำหรับสุ่มพื้นหลัง
    const pastelColors = [
        '#E3F2FD', // Blue
        '#E8F5E9', // Green
        '#FFFDE7', // Yellow
        '#FFF3E0', // Orange
        '#F3E5F5', // Purple
        '#E0F2F1', // Teal
        '#FFEBEE', // Red
        '#F1F8E9'  // Lime
    ];

    let lastColorIndex = -1;

    // ฟังก์ชันสุ่มสีโดยไม่ให้ซ้ำกับตัวล่าสุด
    function getUniqueRandomColor() {
        let newIndex;
        do {
            newIndex = Math.floor(Math.random() * pastelColors.length);
        } while (newIndex === lastColorIndex);
        
        lastColorIndex = newIndex;
        return pastelColors[newIndex];
    }

    // เริ่มทำงานเมื่อโหลดหน้าเสร็จ
    document.addEventListener('DOMContentLoaded', fetchData);

    function fetchData() {
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                renderCards(data);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('ea-container').innerHTML = 
                    '<div class="alert alert-danger mx-3 text-center">เกิดข้อผิดพลาดในการดึงข้อมูล</div>';
            });
    }

    function renderCards(data) {
        const container = document.getElementById('ea-container');
        const loader = document.getElementById('loader');
        
        if (loader) loader.style.display = 'none';

        if (!data || data.length === 0) {
            container.innerHTML = '<div class="alert alert-warning mx-3 text-center">ไม่พบข้อมูลในระบบ</div>';
            return;
        }

        let html = '';
        lastColorIndex = -1; // Reset สี

        data.forEach((item) => {
            const bgColor = getUniqueRandomColor();
            
            html += `
                <div class="ea-card" style="background-color: ${bgColor}">
                    <div class="p-4">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="text-muted small">System</span>
                            <span class="badge rounded-pill bg-primary">Running</span>
                        </div>
                        <h5 class="fw-bold mb-3">${item.name}</h5>
                        
                        <div class="row g-2">
                            <div class="col-6">
                                <small class="text-muted d-block">Stategy</small>
                                <span class="text-secondary">${item.comment || '-'}</span>
                            </div>
                            <div class="col-6 text-end">
                                <small class="text-muted d-block">Style</small>
                                <span class="text-secondary">${item.type || '-'}</span> 
                            </div>
                        </div>

                        <div class="balance-box text-center">
                            <small class="text-muted d-block mb-1">Start Balance</small>
                            <h2 class="fw-bold text-primary mb-0">$${item.balance}</h2>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
</script>

</body>
</html>
